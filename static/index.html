<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pair — Your AI Developer Companion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #000;
      color: #fff;
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(120, 80, 255, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(80, 180, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 85%, rgba(255, 80, 140, 0.04) 0%, transparent 45%);
      pointer-events: none;
    }

    .container {
      max-width: 960px;
      width: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 56px;
    }

    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .wordmark-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #A78BFA, #60A5FA);
      box-shadow: 0 0 16px rgba(167, 139, 250, 0.7);
    }

    .wordmark-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    h1 {
      font-size: clamp(36px, 5vw, 54px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.08;
      background: linear-gradient(160deg, #fff 30%, rgba(255,255,255,0.55) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .subhead {
      font-size: 17px;
      color: rgba(255,255,255,0.38);
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── Persona grid ── */
    .personas {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      width: 100%;
      margin-bottom: 36px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 22px;
      padding: 28px 14px 22px;
      cursor: pointer;
      transition: transform 0.28s cubic-bezier(0.34, 1.2, 0.64, 1),
                  background 0.2s ease,
                  border-color 0.25s ease,
                  box-shadow 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      user-select: none;
    }

    .card:hover {
      background: rgba(255,255,255,0.065);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-3px);
    }

    .card.selected {
      border-color: var(--c1);
      background: rgba(255,255,255,0.065);
      box-shadow:
        0 0 0 1px var(--c1),
        0 12px 48px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
      transform: translateY(-5px);
    }

    .card.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% -10%, var(--glow) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Avatar */
    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--c1), var(--c2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      transition: transform 0.28s cubic-bezier(0.34, 1.2, 0.64, 1),
                  box-shadow 0.25s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    .card.selected .avatar {
      box-shadow: 0 6px 30px var(--shadow);
      transform: scale(1.06);
    }

    /* Check badge */
    .check {
      position: absolute;
      top: 13px;
      left: 13px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--c1);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: white;
      font-weight: 700;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .card.selected .check { display: flex; }

    /* Preview button */
    .prev-btn {
      position: absolute;
      top: 13px;
      right: 13px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s ease;
      font-size: 9px;
      color: rgba(255,255,255,0.6);
      z-index: 2;
      flex-shrink: 0;
    }
    .prev-btn:hover { background: rgba(255,255,255,0.18); color: white; transform: scale(1.12); }
    .prev-btn.playing { background: var(--c1); border-color: transparent; color: white; }

    .name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.95);
    }

    .tagline {
      font-size: 11px;
      font-weight: 600;
      color: var(--c1);
      letter-spacing: 0.02em;
      text-align: center;
    }

    .desc {
      font-size: 11.5px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      line-height: 1.45;
    }

    .gender-tag {
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .gender-tag::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: block;
    }

    /* ── CTA ── */
    .launch-btn {
      padding: 15px 52px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.25);
      font-family: var(--font);
      pointer-events: none;
    }

    .launch-btn.ready {
      background: linear-gradient(135deg, var(--btn-c1, #A78BFA), var(--btn-c2, #818CF8));
      color: white;
      border-color: transparent;
      box-shadow: 0 8px 32px var(--btn-shadow, rgba(167,139,250,0.35));
      pointer-events: all;
    }

    .launch-btn.ready:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 44px var(--btn-shadow, rgba(167,139,250,0.45));
    }

    .launch-btn.ready:active { transform: scale(0.97); }

    /* ── Launched state ── */
    .launched {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      animation: rise 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .launched.show { display: flex; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .launched-orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--orb-c1, #A78BFA), var(--orb-c2, #818CF8));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      animation: glow-pulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 48px var(--btn-shadow, rgba(167,139,250,0.4));
    }

    @keyframes glow-pulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 40px var(--btn-shadow, rgba(167,139,250,0.4)); }
      50%       { transform: scale(1.07); box-shadow: 0 0 80px var(--btn-shadow, rgba(167,139,250,0.6)); }
    }

    .launched h2 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .launched p {
      font-size: 15px;
      color: rgba(255,255,255,0.38);
      max-width: 320px;
      line-height: 1.5;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header" id="header">
      <div class="wordmark">
        <div class="wordmark-dot"></div>
        <span class="wordmark-text">Pair</span>
      </div>
      <h1>Meet your AI companion.</h1>
      <p class="subhead">Voice-first. Always on. Built for developers.</p>
    </div>

    <!-- Picker -->
    <div id="picker">
      <p class="section-label">Choose your voice</p>

      <div class="personas" id="personas-grid"></div>

      <div style="display:flex;justify-content:center;">
        <button class="launch-btn" id="launch-btn" onclick="launch()">
          Launch Pair
        </button>
      </div>
    </div>

    <!-- Launched state -->
    <div class="launched" id="launched-ui">
      <div class="launched-orb" id="launched-orb">🎙</div>
      <h2 id="launched-name">Launching…</h2>
      <p>Look for the widget in the corner of your screen.<br>You can close this window.</p>
    </div>

  </div>

  <script>
    const PERSONAS = [
      {
        id: "emily", name: "Emily", tagline: "Sharp & Professional",
        desc: "Clear, concise,\ngets things done", gender: "female",
        c1: "#A78BFA", c2: "#818CF8", rgb: "167,139,250",
        preview: "https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/emily.wav"
      },
      {
        id: "judi", name: "Judi", tagline: "Calm & Focused",
        desc: "Patient, precise,\nnever flustered", gender: "female",
        c1: "#34D399", c2: "#059669", rgb: "52,211,153",
        preview: "https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/judi.wav"
      },
      {
        id: "enola", name: "Enola", tagline: "Energetic & Direct",
        desc: "Fast, fun,\nfull of personality", gender: "female",
        c1: "#F472B6", c2: "#DB2777", rgb: "244,114,182",
        preview: "https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/enola.wav"
      },
      {
        id: "james", name: "James", tagline: "Clear & Reliable",
        desc: "Steady, dependable,\nno nonsense", gender: "male",
        c1: "#60A5FA", c2: "#2563EB", rgb: "96,165,250",
        preview: "https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/james.wav"
      },
      {
        id: "george", name: "George", tagline: "Bold & Decisive",
        desc: "Confident,\ncommanding voice", gender: "male",
        c1: "#FBBF24", c2: "#D97706", rgb: "251,191,36",
        preview: "https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/george.wav"
      },
    ];

    let selected = null;
    let currentAudio = null;

    function init() {
      const grid = document.getElementById("personas-grid");
      PERSONAS.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        card.id = "card-" + p.id;
        card.style.cssText = `--c1:${p.c1};--c2:${p.c2};--glow:rgba(${p.rgb},0.15);--shadow:rgba(${p.rgb},0.4)`;
        card.setAttribute("data-id", p.id);
        card.onclick = e => { if (!e.target.closest(".prev-btn")) pick(p.id); };
        card.innerHTML = `
          <span class="check">✓</span>
          <button class="prev-btn" id="pb-${p.id}" title="Preview" onclick="preview('${p.id}','${p.preview}',event)">▶</button>
          <div class="avatar">${p.name[0]}</div>
          <div class="name">${p.name}</div>
          <div class="tagline">${p.tagline}</div>
          <div class="desc">${p.desc.replace('\n','<br>')}</div>
          <div class="gender-tag">${p.gender}</div>
        `;
        grid.appendChild(card);
      });
    }

    function pick(id) {
      selected = id;
      document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
      document.getElementById("card-" + id).classList.add("selected");

      const p = PERSONAS.find(x => x.id === id);
      const btn = document.getElementById("launch-btn");
      btn.textContent = `Launch with ${p.name}`;
      btn.classList.add("ready");
      btn.style.cssText = `--btn-c1:${p.c1};--btn-c2:${p.c2};--btn-shadow:rgba(${p.rgb},0.4)`;
    }

    function preview(id, url, e) {
      e.stopPropagation();
      const btn = document.getElementById("pb-" + id);

      if (currentAudio) {
        currentAudio.pause();
        document.querySelectorAll(".prev-btn").forEach(b => { b.classList.remove("playing"); b.textContent = "▶"; });
        if (currentAudio._id === id) { currentAudio = null; return; }
      }

      const audio = new Audio(url);
      audio._id = id;
      currentAudio = audio;
      btn.classList.add("playing");
      btn.textContent = "■";
      audio.play().catch(() => {});
      audio.onended = () => { btn.classList.remove("playing"); btn.textContent = "▶"; currentAudio = null; };
    }

    async function launch() {
      if (!selected) return;
      const p = PERSONAS.find(x => x.id === selected);

      if (currentAudio) { currentAudio.pause(); currentAudio = null; }

      // Swap to launched UI
      document.getElementById("header").classList.add("hidden");
      document.getElementById("picker").classList.add("hidden");

      const ui = document.getElementById("launched-ui");
      const orb = document.getElementById("launched-orb");
      ui.classList.add("show");
      orb.style.background = `linear-gradient(145deg, ${p.c1}, ${p.c2})`;
      orb.style.boxShadow = `0 0 48px rgba(${p.rgb}, 0.5)`;
      document.getElementById("launched-name").textContent = `Starting ${p.name}…`;
      document.documentElement.style.setProperty("--btn-shadow", `rgba(${p.rgb},0.4)`);

      try {
        const res = await fetch("/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ voice_id: selected })
        });
        if (res.ok) {
          document.getElementById("launched-name").textContent = `${p.name} is ready.`;
        }
      } catch (err) {
        document.getElementById("launched-name").textContent = "Something went wrong.";
        ui.querySelector("p").textContent = err.message;
      }
    }

    init();
  </script>
</body>
</html>
