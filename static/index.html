<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pair</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      --text: #1d1d1f;
      --muted: #86868b;
      --bg: #f5f5f7;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Soft ambient light */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(139,92,246,0.09) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 85%, rgba(236,72,153,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      max-width: 920px;
      width: 100%;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Wordmark ── */
    .wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
    }

    .wordmark-orb {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(270deg, #8B5CF6, #3B82F6, #06B6D4, #EC4899, #8B5CF6);
      background-size: 400% 400%;
      animation: flow 4s ease infinite;
      box-shadow: 0 4px 16px rgba(139,92,246,0.35);
    }

    .wordmark-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      margin-bottom: 52px;
    }

    .hero-orb {
      width: 96px; height: 96px; border-radius: 50%;
      background: linear-gradient(270deg, #8B5CF6, #3B82F6, #06B6D4, #EC4899, #8B5CF6);
      background-size: 400% 400%;
      animation: flow 3s ease infinite;
      margin: 0 auto 28px;
      box-shadow:
        0 0 0 18px rgba(139,92,246,0.07),
        0 0 0 36px rgba(59,130,246,0.04),
        0 12px 40px rgba(139,92,246,0.3);
    }

    @keyframes flow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: clamp(34px, 4.5vw, 50px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.08;
      color: var(--text);
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 17px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Section label ── */
    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── Persona cards ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      width: 100%;
      margin-bottom: 36px;
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      transition:
        transform 0.3s cubic-bezier(0.34,1.2,0.64,1),
        box-shadow 0.25s ease,
        border-color 0.25s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 36px rgba(0,0,0,0.1);
    }

    .card.selected {
      border-color: var(--c1);
      box-shadow: 0 10px 36px rgba(0,0,0,0.1), 0 0 0 3px var(--glow);
      transform: translateY(-6px);
    }

    /* Pastel gradient top */
    .card-top {
      padding: 26px 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .avatar {
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(145deg, var(--c1), var(--c2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: white;
      box-shadow: 0 6px 20px var(--shadow);
      transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
    }

    .card.selected .avatar { transform: scale(1.08); }

    .card-tagline {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--c1);
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* Check + Preview */
    .check {
      position: absolute; top: 11px; left: 11px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--c1);
      display: none; align-items: center; justify-content: center;
      font-size: 11px; color: white; font-weight: 700;
    }
    .card.selected .check { display: flex; }

    .prev-btn {
      position: absolute; top: 11px; right: 11px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 9px; color: var(--c1);
      transition: all 0.18s ease;
    }
    .prev-btn:hover { background: white; transform: scale(1.12); }
    .prev-btn.playing { background: var(--c1); border-color: var(--c1); color: white; }

    /* Card bottom */
    .card-bottom {
      padding: 14px 16px 18px;
      background: white;
      border-top: 1px solid rgba(0,0,0,0.05);
    }

    .card-name {
      font-size: 16px; font-weight: 600;
      color: var(--text); letter-spacing: -0.01em;
      margin-bottom: 3px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .card-gender {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(0,0,0,0.22);
      display: flex; align-items: center; gap: 5px;
    }
    .card-gender::before {
      content: '';
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(0,0,0,0.2); display: block;
    }

    /* ── CTA ── */
    .cta {
      display: flex;
      justify-content: center;
    }

    .btn {
      padding: 15px 52px;
      border-radius: 50px;
      border: none;
      font-family: var(--font);
      font-size: 16px; font-weight: 600;
      letter-spacing: -0.01em;
      background: #e5e5ea;
      color: rgba(0,0,0,0.28);
      cursor: default;
      transition: all 0.3s cubic-bezier(0.34,1.2,0.64,1);
    }

    .btn.live {
      background: linear-gradient(135deg, var(--bc1), var(--bc2));
      color: white;
      box-shadow: 0 8px 32px var(--bshadow);
      cursor: pointer;
    }
    .btn.live:hover { transform: scale(1.04); box-shadow: 0 12px 44px var(--bshadow); }
    .btn.live:active { transform: scale(0.97); }

    /* ── Launched state ── */
    .launched {
      display: none;
      flex-direction: column; align-items: center; gap: 18px;
      text-align: center;
      animation: rise 0.5s cubic-bezier(0.34,1.2,0.64,1);
    }
    .launched.show { display: flex; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .launched-orb {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(270deg, #8B5CF6, #3B82F6, #06B6D4, #EC4899, #8B5CF6);
      background-size: 400% 400%;
      animation: flow 2s ease infinite;
      box-shadow:
        0 0 0 18px rgba(139,92,246,0.08),
        0 0 0 36px rgba(139,92,246,0.04),
        0 12px 40px rgba(139,92,246,0.3);
    }

    .launched h2 {
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--text);
    }

    .launched p {
      font-size: 15px; color: var(--muted);
      max-width: 290px; line-height: 1.5;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">

    <div class="wordmark" id="nav">
      <div class="wordmark-orb"></div>
      <span class="wordmark-text">Pair</span>
    </div>

    <div class="hero" id="hero">
      <div class="hero-orb"></div>
      <h1>Meet your AI companion.</h1>
      <p class="subtitle">Voice-first. Always on. Built for developers.</p>
    </div>

    <div id="picker">
      <p class="label">Choose your voice</p>
      <div class="grid" id="grid"></div>
      <div class="cta">
        <button class="btn" id="btn" onclick="launch()">Launch Pair</button>
      </div>
    </div>

    <div class="launched" id="launched">
      <div class="launched-orb"></div>
      <h2 id="launched-title">Launching…</h2>
      <p>Look for the Pair widget at the bottom of your screen.</p>
    </div>

  </div>

  <script>
    const P = [
      { id:"olivia", name:"Olivia", tagline:"Warm & thoughtful",   desc:"Measured, clear,\nalways on point",    gender:"female", c1:"#8B5CF6", c2:"#6D28D9", rgb:"139,92,246",  top:"linear-gradient(160deg,#EDE9FE,#DDD6FE)", preview:"https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/olivia.wav" },
      { id:"quinn",  name:"Quinn",  tagline:"Sharp & direct",       desc:"Fast, precise,\nno filler",            gender:"female", c1:"#059669", c2:"#047857", rgb:"5,150,105",    top:"linear-gradient(160deg,#D1FAE5,#A7F3D0)", preview:"https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/quinn.wav"  },
      { id:"harper", name:"Harper", tagline:"Energetic & bright",   desc:"Upbeat, engaging,\nfull of warmth",    gender:"female", c1:"#DB2777", c2:"#BE185D", rgb:"219,39,119",   top:"linear-gradient(160deg,#FCE7F3,#FBCFE8)", preview:"https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/harper.wav" },
      { id:"ethan",  name:"Ethan",  tagline:"Clear & reliable",     desc:"Steady, dependable,\nno nonsense",     gender:"male",   c1:"#2563EB", c2:"#1D4ED8", rgb:"37,99,235",    top:"linear-gradient(160deg,#DBEAFE,#BFDBFE)", preview:"https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/ethan.wav"  },
      { id:"lucas",  name:"Lucas",  tagline:"Bold & decisive",      desc:"Confident,\ncommanding voice",         gender:"male",   c1:"#D97706", c2:"#B45309", rgb:"217,119,6",    top:"linear-gradient(160deg,#FEF3C7,#FDE68A)", preview:"https://d4a5s42qh2351.cloudfront.net/waves-audio-previews/lucas.wav"  },
    ];

    let sel = null, audio = null;

    P.forEach(p => {
      const card = document.createElement("div");
      card.className = "card"; card.id = "c-" + p.id;
      card.style.cssText = `--c1:${p.c1};--c2:${p.c2};--shadow:rgba(${p.rgb},.35);--glow:rgba(${p.rgb},.18)`;
      card.onclick = e => { if (!e.target.closest(".prev-btn")) pick(p.id); };
      card.innerHTML = `
        <div class="card-top" style="background:${p.top}">
          <span class="check">✓</span>
          <button class="prev-btn" id="pb-${p.id}" onclick="prev('${p.id}','${p.preview}',event)">▶</button>
          <div class="avatar">${p.name[0]}</div>
          <div class="card-tagline">${p.tagline}</div>
        </div>
        <div class="card-bottom">
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc.replace('\n','<br>')}</div>
          <div class="card-gender">${p.gender}</div>
        </div>`;
      document.getElementById("grid").appendChild(card);
    });

    function pick(id) {
      sel = id;
      document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
      document.getElementById("c-" + id).classList.add("selected");
      const p = P.find(x => x.id === id);
      const btn = document.getElementById("btn");
      btn.textContent = `Launch with ${p.name}`;
      btn.classList.add("live");
      btn.style.cssText = `--bc1:${p.c1};--bc2:${p.c2};--bshadow:rgba(${p.rgb},.35)`;
    }

    function prev(id, url, e) {
      e.stopPropagation();
      const btn = document.getElementById("pb-" + id);
      if (audio) {
        audio.pause();
        document.querySelectorAll(".prev-btn").forEach(b => { b.classList.remove("playing"); b.textContent="▶"; });
        if (audio._id === id) { audio = null; return; }
      }
      audio = new Audio(url); audio._id = id;
      btn.classList.add("playing"); btn.textContent = "■";
      audio.play().catch(()=>{});
      audio.onended = () => { btn.classList.remove("playing"); btn.textContent="▶"; audio=null; };
    }

    async function launch() {
      if (!sel) return;
      const p = P.find(x => x.id === sel);
      if (audio) { audio.pause(); audio = null; }
      ["nav","hero","picker"].forEach(id => document.getElementById(id).classList.add("hidden"));
      document.getElementById("launched").classList.add("show");
      document.getElementById("launched-title").textContent = `Starting ${p.name}…`;
      try {
        const r = await fetch("/start", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({voice_id:sel}) });
        document.getElementById("launched-title").textContent = r.ok ? `${p.name} is ready.` : "Something went wrong.";
      } catch(err) {
        document.getElementById("launched-title").textContent = "Could not connect.";
      }
    }
  </script>
</body>
</html>
